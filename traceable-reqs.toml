[[requirements]]
id = "REQ-DIST-UPDATE-MESSAGE"
title = "The adapter manifest [update] table carries a `message` markdown field, printed by spt-core ONLY on a real version apply: it tells the user to run /reload-plugins (the unavoidable TUI step) and points at the more-powerful `spt` CLI endpoint route (`spt endpoint run`) alongside /sptc:live. U1."
required_stages = ["impl", "unit"]  # U1 (the [update].message field) ACTIVATED 2026-06-25; D2 ([update.post] composite) PROMOTED to +impl 2026-06-26 (spt-core v0.16.0). impl: tools/claude-spt/src/post_update.rs — the [update.post] stdin/stdout contract (update_applied_in parses the additive JSON context; arbiter_line emits the `!!update-message!!` sentinel on a successful reconcile so the static [update].message fires; diagnostics→stderr, stdout=arbiter; fail-isolated; three modes incl --dry-run). The manifest seams [update].message + [update.post]{command="{adapter_dir}/claude-spt post-update", self_verifies=false} are .toml (unscanned) — evidence is the unit assertions. unit: tests/manifest-shortcut.sh (message present + /reload-plugins notice + [update.post] table/command) + the crate's cargo tests (update_applied_in additive parse, arbiter_line sentinel/empty) + tests/manifest-schema.sh (validates against the re-vendored v0.16.0 schema with update.post). doc DEFERRED to the docs-site slice (designed in docs/adr/0006 + UPDATE-NAMING-DOYLE-ASKS.md). int DEFERRED to the publish dogfood: real `spt adapter update claude-spt` pulls the .spt then fires [update.post] → post-update reconciles the plugin → sentinel → [update].message prints (needs the v0.8.0 release published).


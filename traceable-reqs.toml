id = "REQ-DIST-PRETOOL-POLL"
title = "claude-spt wires a PreToolUse hook firing `api poll` so a live agent receives messages MID-TURN (legacy-parity reachability; today claude-spt drains only on UserPromptSubmit = between turns). F-021."
required_stages = ["impl", "unit"]  # Reachability-parity item (F-021) — ACTIVATED 2026-06-25. Two coupled halves: (a) honest TURN-STATE lifecycle — UserPromptSubmit marks `api state busy` at turn-start, Stop marks `api state idle` at turn-end (spt-core never infers activity from quiescence — harness-contract/integration-checklist), so inbound DEFERS during a busy turn instead of idle-PTY-injecting; (b) the NEW PreToolUse hook drains those deferred messages MID-turn (`api poll {session_id} --include-deferred` -> additionalContext), the legacy spt poll+inject-on-PreToolUse reachability. UPS drain also gains --include-deferred. PreToolUse ALSO marks `api state busy` (idempotent) — the ONLY busy mark for a turn that starts WITHOUT a UserPromptSubmit (a Monitor-delivered message triggers a new turn with no user prompt; the first tool call is the earliest turn-active signal). Residual: a non-user text-only turn marks neither (low risk — no tool/PTY interleave; Stop re-idles). impl: plugin/sptc/hooks/pre-tool-use.sh (state busy before the drain) + the `api state busy` add in user-prompt-submit.sh + hooks.json PreToolUse entry + manifest [hooks.PreToolUse] / [hooks.UserPromptSubmit] busy+include-deferred. unit: tests/hooks-parse.sh PreToolUse-reachability wiring block (PreToolUse declared + routed, deferred-drain shape, UPS busy + include-deferred, Stop idle, manifest [hooks.PreToolUse]). int DEFERRED (same bucket as the other harness-glue E2Es — needs the NEW plugin installed + a real live CC): a mid-turn `spt send` to a busy live agent surfaces as additionalContext on the next tool call. `api state` + `api poll --include-deferred` are already on the public surface — adapter wiring, NOT an spt-core gap. Shapes verified against the published integration-checklist 2026-06-25.


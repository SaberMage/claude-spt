[[requirements]]
id = "REQ-DIST-IDLE-MULTILINE"
title = "The idle-translation binary renders each inbound <EVENT> envelope across MULTIPLE LINES in CC's input box for visual distinction — an embedded raw newline byte in the {text} payload after the opening <EVENT ...> tag and before the closing </EVENT> (spt-core writes {text} byte-verbatim including newlines, doyle-confirmed; CC soft-newlines on a bare newline, empirically gated). Cyan color is impossible (SGR bytes eaten by CC input handling; user-turns theme-fixed)."
required_stages = ["impl", "unit", "int"]  # Feature 1 / task T1 — ACTIVATED 2026-06-24 after the empirical soft-newline gate PASSED (probe binary on a live spt-hosted endpoint: a two-line {text} landed as ONE user turn with the \n preserved, no early submit). impl: cc-spt-idle-translate frame_envelope splits the envelope opening-tag/\n/body/\n/closing-tag, embedding two deliberate \n's AFTER the stray-CR/LF-neutralize (degenerate fallback for non-<EVENT>…</EVENT> shapes incl. EVENT-PART). unit: the crate's framing tests (envelope_is_framed_across_three_lines + fallback/attrless/empty-body + stray-then-framing). int: ci/idle-translate/translate-proof-int.sh asserts the emitted {text} frames across lines (>\n … \n</EVENT>) — the EMIT half; the soft-newline APPLY half was the empirical probe (heavier tier, like the real-claude bringup int). Contract A frozen (doyle: {text} raw-verbatim; key-vocab + {text}-verbatim doc folds into spt-core v0.15.0 W4).

[[requirements]]
id = "REQ-DIST-CHECKPOINT-COMMUNE"
title = "Agent-driven checkpoint: a live agent flags a commune with the literal trigger !!checkpoint!! (one = default wake; a pair brackets a custom wake directive); a PostToolUse hook detects the trigger in the Write tool_input.content for .claude/<id>-commune.md, sets the perch idle (api state idle), and self-sends a reserved wire-sentinel (spt send --from <id> <id>); the message loops back through the endpoint's own translation binary, which fires the clear+wake macro (ctrl+s · 50ms · /clear · enter · 500ms · wake-text · enter · commit). spt-hosted-only. INVARIANT: the commune is authored INLINE pre-clear (ADR-0004, Shape 1), never via a post-clear resume-Self refresh."
required_stages = []  # Feature 2 / task T2. ACTIVATE at build. doc: ADR-0004 + CHECKPOINT-COMMUNE-PLAN.md. impl: full-fat /sptc:commune SKILL.md (+ --checkpoint flag + [[hints]]) + NEW PostToolUse hook (manifest [hooks.PostToolUse] + hooks.json + detector reading tool_input.content) + cc-spt-idle-translate checkpoint branch (wire-sentinel filter -> clear+wake macro + double-trigger custom-wake parse). unit: binary macro tests + hook parse tests. int: live endpoint — flagged commune -> /clear fires -> wake turn (default + custom). Mechanics have ZERO spt-core dependency; self-send loopback PROVEN 2026-06-24.


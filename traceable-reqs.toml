title = "claude-spt-digest + claude-spt-psyche merge into ONE `claude-spt` crate with clap subcommands (digest / psyche / post-update); post-update = the plugin-sync logic (detect claude|ccs CLI -> ensure cplugs marketplace -> claude plugin add|update -> print notice; does NOT run /reload-plugins). cc-spt-idle-translate stays separate (folds at D3). U2."
required_stages = ["impl", "unit", "int"]  # U2 (the big refactor; preps post-update for D2) — ACTIVATED 2026-06-25, int promoted same day (proofs ran GREEN on the consolidated binary). impl: tools/claude-spt crate (main.rs subcommand dispatch [classify] + post_update.rs CLI-detect/marketplace/plugin reconciliation; digest+psyche folded in as subcommands) + manifest [digest].extractor `claude-spt digest …` + [session.psyche_init].command `claude-spt psyche …` + ci/digest/build.sh (canonical consolidated build) + ci/psyche/build.sh (shim, one build) + package-adapter.sh binary-set (claude-spt + cc-spt-idle-translate per triple). unit: the crate's cargo tests (37: subcommand classify dispatch + the ported digest/psyche tests + post-update CLI-pick / marketplace-registered / plugin-installed / pathext / notice). int: ci/digest/digest-proof-int.sh — `spt adapter digest-proof claude-spt --dir tools/claude-spt …` ran the consolidated binary's `digest` subcommand end-to-end through real spt (DIGEST_PROOF_OK, 5 parsed/0 dropped) — GREEN on-node 2026-06-25 on spt 0.15.0; the separate cc-spt-idle-translate stays green via translate-proof-int. tests/adapter-archive.sh [unit] asserts the archive packs the 2 binaries per triple. Old claude-spt-digest/claude-spt-psyche crates DELETED (evidence moved to tools/claude-spt). NB hand-rolled argv[1] dispatch, NOT clap (deviation from the JIT plan's "clap subcommands" — honors both predecessor crates' deliberate dependency-light ethos; a flat 3-way dispatch needs no framework). post-update is standalone-runnable + tested now but [update] can't invoke it until doyle ask #2 (D2).


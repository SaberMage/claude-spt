[[requirements]]
id = "REQ-DIST-ADAPTER-PEROS"
title = "The adapter ships ONE host-agnostic MULTI-PLATFORM `adapter.spt` (ADR-0024 W1, spt-core >= 0.13.2): a single fat archive bundles every recognized target-triple's tool binaries under a `<triple>/` dir beside the SHARED manifest.toml + strings/ at the archive root; install classifies the triple dirs and flattens THIS node's triple into the install dir, so a bare-name command token resolves (REQ-INSTALL-11). `spt adapter add --release` (default asset adapter.spt) + the `[update] gh_release` avenue auto-resolve the host's binaries from the one asset — RETIRING the F-014 per-OS stopgap (the old single-OS adapter.spt-by-default that broke on a foreign host). v1 triples = x86_64-pc-windows-msvc + x86_64-unknown-linux-gnu (the only two spt-core recognizes in a fat archive; platforms beyond these ship a separate single-triple asset via `--asset`)."
required_stages = ["doc", "impl", "unit"]  # doc: docs/RELEASE-RUNBOOK.md fat-archive packaging section (win native + linux cross-build via cargo-zigbuild — proven 2026-06-16, real ELF x86-64; bare `cargo build --target` fails `cc not found`, zig supplies the linker). impl: ci/publish/package-adapter.sh stages the shared root (manifest.toml + strings/) + each <triple>/ (win .exe, linux ELF) into ONE adapter.spt, refuses a < 0.13.2 floor, and guards the unrecognized-top-level-dir footgun. unit: tests/adapter-archive.sh asserts shared-root + both <triple>/ binary sets + no stray top-level dir + the fat-capable floor. int (real spt-core extract+flatten of the fat asset) folds into release-acquire-int.sh once the fat adapter.spt is published on a release; the win-triple flatten was LOCAL-dogfooded 2026-06-22 (extract → flatten win triple → translate-proof + digest-proof OK). NOTE: /sptc:setup's os-detection + `--asset` step is now OPTIONAL (the default fat adapter.spt is host-agnostic) — retained as harmless; simplifying setup to the bare default is a follow-on. See REQ-DIST-ADAPTER-RELEASE."


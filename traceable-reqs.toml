[[requirements]]
id = "REQ-DIST-CCS-PLUGIN-FOLLOWUP"
title = "When `ccs` is installed alongside `claude`, the post-update plugin reconcile ALSO runs `ccs plugin update sptc@cplugs` (best-effort): ccs-launched sessions read their own per-account plugin tree (the CLAUDE_CONFIG_DIR relocation, ~/.ccs/instances/<account>/.claude), which the claude-side reconcile never touches — without the follow-up a ccs session keeps running the STALE plugin after every `spt adapter update`. Not fired when ccs is absent or when ccs IS the primary CLI (already reconciled). Best-effort by design: `update` (never `install` — a ccs account that never installed the plugin is not this reconcile's call), failure → stderr noise only, NEVER a post-update failure and NEVER the stdout arbiter channel. Operator ask 2026-07-01 (v0.10.3)."
required_stages = ["impl", "unit"]  # MINTED + ACTIVATED 2026-07-01 (v0.10.3, operator ask mid-cut). impl: tools/claude-spt/src/post_update.rs — ccs_followup_needed (pure gate: has_ccs && primary != ccs) + ccs_followup_cmd (plugin update sptc@cplugs) + the best-effort spawn block in run() (after the primary reconcile, before the arbiter print; dry-run prints `would run: ccs plugin update sptc@cplugs`); spawns via launch.rs resolve_program_from (the npm ccs.cmd shim is unspawnable from a bare name on Windows — the same wall the launch shim hits; the primary reconcile spawn is ALSO resolved now, fixing the latent ccs-primary case). unit: the post_update.rs cargo test ccs_followup_only_when_ccs_present_and_not_primary (gate truth table + update-never-install argv). int DEFERRED: real `spt adapter update` on a dual-CLI node shows the follow-up line + a ccs session picks up the new plugin (on-node dogfood at the v0.10.3 cut — this node IS dual-CLI).

[[requirements]]
id = "REQ-DIST-RC-STARTUP"
title = "Every spt-hosted CC bringup — [session.self] (fresh) AND [session.resume] (native-resume), base AND ccs profile — is NODE-NAMED: display name `-n \"<id> @ <node>\"` + Remote Control `--remote-control <id>--<node>`, so a fleet of endpoints is cross-node-distinguishable in the prompt box / /resume picker / RC list. Delivered ADAPTER-SIDE via the `claude-spt launch` spawn shim (v0.10.3, the doyle-ask-#4 stretch): the published fill catalog has NO {node} key (reported spt-core gap) and tokenize-then-fill cannot yield a space-carrying argv element, so the shim computes the hostname ON-NODE (COMPUTERNAME/HOSTNAME/`hostname`) and passes each name as one clean argv element. RC gets the tokeny `<id>--<node>` form (space-safety of explicit RC names unverifiable from the public surface; CC's auto-generated RC names are hostname-prefixed tokens). Unknown node ⇒ both names degrade to bare <id>. `spt rc <id>` is unaffected (broker attaches by ENDPOINT id, not CC's RC name). U6 origin: the {id}-only -n/RC threading."
required_stages = ["impl", "unit"]  # U6 ACTIVATED 2026-06-25 ({id}-only, unit-only declaration seam). PROMOTED to impl+unit 2026-07-01 (v0.10.3): the stretch shipped adapter-side, so there is now scannable impl. impl: tools/claude-spt/src/launch.rs — Args parse (--id/--cli/--resume), node_name (COMPUTERNAME → HOSTNAME → `hostname`), display_name/rc_name (degrade-to-bare-id on unknown node), cli_argv ([-r sid] -n <display> --remote-control <rc> --dangerously-skip-permissions), Windows PATHEXT resolution (npm ccs.cmd shim unspawnable from a bare name), unix exec()/windows spawn+wait. Manifest seams (unscanned .toml): all four session commands = `{adapter_dir}/claude-spt launch [--cli ccs] --id {id} [--resume {session_id}]`. unit: the launch.rs cargo tests (name shapes, degrade rule, fresh/resume argv, parser loudness, per-OS resolution) + tests/manifest-shortcut.sh (4 launch spawn lines, --id {id} on all, no bare claude/ccs bypass, shim emits -n/--remote-control + skip-perms cross-file guards). doc DEFERRED to the docs-site harness-contract RUN-group slice. int DEFERRED: a fresh `spt endpoint run` endpoint presents `<id> @ <node>` in the CC prompt box + stays `spt rc <id>`-attachable; on-node dogfood at the v0.10.3 cut. {node} fill-key gap REPORTED to spt-core (doyle ask #4 origin) — if a {node} fill lands, the shim stays (space-carrying display name is still untemplatable manifest-side).
